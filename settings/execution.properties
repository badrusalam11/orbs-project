# =====================
# RETRY CONFIG
# =====================
# Enable automatic retry on test failure
retry_enabled=false
retry_max_attempts=2

# =====================
# SELF-HEALING CONFIG
# =====================
# Enable self-healing for object repository (try alternative locators if primary fails)
self_healing_enabled=true
# Maximum number of alternative locators to try (including primary)
self_healing_max_attempts=5

# =====================
# SCREENSHOT CONFIG
# =====================
# Automatically capture screenshot on test failure
screenshot_on_fail=true
screenshot_on_retry=false
screenshot_path=reports/screenshots
# screenshot_full_page: Capture entire scrollable page (true) or just viewport (false)
# - Chrome/Edge: Uses CDP for full page capture
# - Firefox: Native full page support
# - Safari: Falls back to viewport only
screenshot_full_page=false

# =====================
# TIMEOUT CONFIG (seconds)
# =====================
implicit_timeout=10
explicit_timeout=20
page_load_timeout=60

# =====================
# LOGGING
# =====================
# Log level: DEBUG, INFO, WARNING, ERROR, CRITICAL
log_level=INFO
